<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teen Mental Health Predictor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Mental Health Assessment</h1>
        <p>Please fill out the form below for an AI assessment.</p>
        
        <form id="prediction-form">
            <label for="age">Age:</label>
            <input type="number" id="age" required min="13" max="19">

            <label for="gender">Gender:</label>
            <select id="gender">
                <option value="0">Male</option>
                <option value="1">Female</option>
            </select>

            <label for="social_media">Daily Social Media (Hours):</label>
            <input type="number" step="0.1" id="social_media" required>

            <label for="platform">Preferred Platform:</label>
            <select id="platform">
                <option value="0">Instagram</option>
                <option value="1">TikTok</option>
                <option value="2">Both</option>
            </select>

            <label for="sleep">Sleep Hours:</label>
            <input type="number" step="0.1" id="sleep" required>

            <label for="screen_time">Screen Time Before Sleep (Hours):</label>
            <input type="number" step="0.1" id="screen_time" required>

            <label for="academic">Academic Performance (GPA/Scale):</label>
            <input type="number" step="0.01" id="academic" required>

            <label for="physical">Physical Activity (Hours):</label>
            <input type="number" step="0.1" id="physical" required>

            <label for="social_interaction">Social Interaction Level:</label>
            <select id="social_interaction">
                <option value="0">Low</option>
                <option value="1">Medium</option>
                <option value="2">High</option>
            </select>

            <label for="stress">Stress Level (1-10):</label>
            <input type="range" id="stress" min="1" max="10" value="5">

            <label for="anxiety">Anxiety Level (1-10):</label>
            <input type="range" id="anxiety" min="1" max="10" value="5">

            <label for="addiction">Addiction Level (1-10):</label>
            <input type="range" id="addiction" min="1" max="10" value="5">

            <button type="button" onclick="runInference()">Predict Depression Status</button>
        </form>

        <div id="result-box">
            <h3>Result: <span id="prediction-text">Waiting...</span></h3>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
